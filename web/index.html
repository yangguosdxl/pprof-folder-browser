<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>pprof 文件浏览器</title>
    <link rel="stylesheet" href="/vendor/jstree/themes/default/style.min.css" />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="tabs-panel" aria-label="页签">
        <div
          id="sidebarResizeHandleLeft"
          class="sidebar-resize-handle sidebar-resize-handle-left"
          role="separator"
          aria-label="从左侧调整页签栏宽度"
          aria-orientation="vertical"
          tabindex="0"
        ></div>
        <div class="tabs-head">
          <h2>页签</h2>
          <button id="addTabBtn" type="button">新增</button>
        </div>
        <div class="tab-row">
          <div id="tabList" class="tab-list" role="tablist" aria-orientation="vertical"></div>
        </div>
      </section>

      <div
        id="sidebarResizeHandleRight"
        class="sidebar-resize-handle sidebar-resize-handle-right"
        role="separator"
        aria-label="从右侧调整页签栏宽度"
        aria-orientation="vertical"
        tabindex="0"
      ></div>

      <div class="content">
        <section class="toolbar">
          <div>
            <h1>pprof 文件浏览器</h1>
            <p>加载多个目录，点击 profile 文件后用浏览器打开对应的 go tool pprof Web UI。</p>
          </div>
          <button id="scanBtn" class="primary">扫描</button>
        </section>

        <section class="panel">
          <form id="dirForm" class="dir-form">
            <input id="dirInput" type="text" placeholder="输入目录路径，例如 F:\profiles" autocomplete="off" />
            <button id="chooseDirBtn" type="button">选择目录</button>
            <button type="submit">添加目录</button>
          </form>
          <div id="dirList" class="dir-list"></div>
        </section>

        <section class="list-head">
          <input id="filterInput" type="search" placeholder="按文件名或路径过滤" />
          <div class="list-actions">
            <button id="sortNameBtn" class="sort-btn" type="button">文件名</button>
            <button id="sortSizeBtn" class="sort-btn" type="button">大小</button>
            <div id="summary" class="summary">尚未扫描</div>
          </div>
        </section>

        <section class="tree-wrap">
          <div id="profileTree" class="profile-tree"></div>
          <aside id="profileDetail" class="profile-detail"></aside>
        </section>

        <section class="sessions">
          <div class="sessions-head">
            <h2>已打开</h2>
            <button id="clearSessionsBtn" class="danger-btn" type="button">清除全部</button>
          </div>
          <div id="sessionList" class="session-list"></div>
        </section>

        <pre id="logBox" class="log-box"></pre>
      </div>
    </main>
    <script src="/vendor/jquery/jquery-3.7.1.min.js"></script>
    <script src="/vendor/jstree/jstree.min.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
